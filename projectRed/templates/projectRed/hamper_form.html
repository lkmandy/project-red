<!-- Form template for creating and editing hamper requests -->

{% extends "projectRed/base.html" %}

{% block title %}
  Project Red – {{ page_title|default:"Hamper Request" }}
{% endblock %}

{% block content %}
<section class="page-section">
  <div class="container py-4">
    <h1 class="page-title mb-4">{{ page_title|default:"Hamper Request" }}</h1>

    <form method="post" class="hamper-form">
      {% csrf_token %}
      {{ form.as_p }}
      <div class="mt-3 d-flex flex-wrap gap-2">
        <button type="submit" class="btn btn-primary">
          Save
        </button>
        <a href="{% url 'hamper_list' %}" class="btn btn-outline-secondary">
          Cancel
        </a>
      </div>
    </form>
  </div>
</section>
{% endblock %}
